      #   shell: bash
      #   run: |
      #     source /usr/local/Ascend/cann/set_env.sh
      #     export PATH="/usr/local/bisheng/tools/bishengir/bin:$PATH"
      #     export PATH="${LLVM_SYSPATH}/bin:$PATH"
