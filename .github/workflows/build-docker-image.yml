name: Release Triton Ascend Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'docker/Dockerfile.manylinux'
      - 'Makefile'
      - 'requirements.txt'
      - 'requirements_dev.txt'
      - '.github/workflows/build-docker-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'docker/Dockerfile.manylinux'
      - 'Makefile'
      - 'requirements.txt'
      - 'requirements_dev.txt'
      - '.github/workflows/build-docker-image.yml'

permissions:
  contents: read
  actions: write

env:
  CANN_VERSION_PATHS: |
    {
      "8.5.0": "8.5.0",
      "9.0.0-beta.2": "9.0.T511"
    }

jobs:
  build-images:
    name: Build ${{ matrix.os }}-${{ matrix.chip_type }}-${{ matrix.cann_version }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, manylinux]
        chip_type: [910b, A3]
        cann_version: [8.5.0, 9.0.0-beta.2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWD }}

      - name: Resolve CANN version path
        id: cann
        run: |
          VERSION_PATH=$(echo '${{ env.CANN_VERSION_PATHS }}' | jq -r '."${{ matrix.cann_version }}"')
          echo "version_path=${VERSION_PATH}" >> $GITHUB_OUTPUT

      - name: Generate tags
        id: tags
        run: |
          GIT_COMMIT_SHORT="$(git rev-parse --short HEAD)"
          DOCKERFILE="${{ matrix.os == 'manylinux' && 'docker/Dockerfile.manylinux' || 'docker/Dockerfile' }}"
          TAG_COMMIT="${{ matrix.os }}-${{ matrix.chip_type }}-${{ matrix.cann_version }}-${GIT_COMMIT_SHORT}"
          TAG_LATEST="${{ matrix.os }}-${{ matrix.chip_type }}-${{ matrix.cann_version }}-latest"
          echo "dockerfile=${DOCKERFILE}" >> $GITHUB_OUTPUT
          echo "tag_commit=${TAG_COMMIT}" >> $GITHUB_OUTPUT
          echo "tag_latest=${TAG_LATEST}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.tags.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            quay.io/ascend/triton:${{ steps.tags.outputs.tag_commit }}
            quay.io/ascend/triton:${{ steps.tags.outputs.tag_latest }}
          build-args: |
            CHIP_TYPE=${{ matrix.chip_type }}
            CANN_VERSION=${{ matrix.cann_version }}
            CANN_VERSION_PATH=${{ steps.cann.outputs.version_path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max